<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>CG発音レッスン母音と子音一覧</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #fff;
      color: #111;
      font-size: 15px;
      overflow-x: hidden;
      user-select: none;
      -webkit-user-select: none
    }

    /* ===== HEADER ===== */
    .page-header {
      background: #FFE500;
      border-bottom: 4px solid #111;
      padding: 20px 16px
    }

    .page-header h1 {
      font-size: clamp(18px, 5vw, 28px);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.5px;
      line-height: 1.2
    }

    .page-header p {
      font-size: 12px;
      font-weight: 700;
      margin-top: 4px;
      opacity: .7
    }

    /* ===== TOC ===== */
    .toc {
      border: 4px solid #111;
      margin: 16px;
      overflow: hidden
    }

    .toc-toggle {
      width: 100%;
      background: #111;
      color: #FFE500;
      border: none;
      padding: 14px 16px;
      font-size: 14px;
      font-weight: 900;
      text-align: left;
      cursor: pointer;
      letter-spacing: .05em;
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    .toc-toggle .arr {
      transition: transform .25s
    }

    .toc-toggle[aria-expanded="true"] .arr {
      transform: rotate(180deg)
    }

    .toc-body {
      display: none;
      padding: 16px
    }

    .toc-body.open {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0 16px
    }

    @media(min-width:600px) {
      .toc-body.open {
        grid-template-columns: repeat(4, 1fr)
      }
    }

    .toc-col .lno {
      font-size: 10px;
      font-weight: 900;
      background: #111;
      color: #FFE500;
      display: inline-block;
      padding: 1px 7px;
      margin: 10px 0 4px;
      letter-spacing: .05em
    }

    .toc-col:first-child .lno:first-child {
      margin-top: 0
    }

    .toc-col p {
      font-size: 12px;
      padding: 1px 0;
      line-height: 1.7
    }

    .toc-col a {
      color: #111;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: .15s
    }

    .toc-col a:hover {
      border-bottom-color: #FF3B3B
    }

    /* ===== ACCORDION ===== */
    .accordion {
      margin: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 0
    }

    .acc-item {
      border: 3px solid #111;
      border-top: none
    }

    .acc-item:first-child {
      border-top: 3px solid #111
    }

    .acc-btn {
      width: 100%;
      background: #f7f7f7;
      border: none;
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 900;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: inherit
    }

    .acc-btn:hover {
      background: #FFE500
    }

    .acc-item.open .acc-btn {
      background: #111;
      color: #FFE500
    }

    .lesson-badge {
      background: #FF3B3B;
      color: #fff;
      font-size: 10px;
      font-weight: 900;
      padding: 3px 10px;
      letter-spacing: .05em;
      white-space: nowrap;
      flex-shrink: 0
    }

    .acc-item.open .lesson-badge {
      background: #FFE500;
      color: #111
    }

    .acc-btn .titles {
      flex: 1;
      font-size: 12px;
      font-weight: 400;
      color: #555;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .acc-item.open .titles {
      color: #FFE500;
      opacity: .8
    }

    .acc-btn .arr {
      font-size: 11px;
      color: #999;
      flex-shrink: 0;
      transition: transform .2s
    }

    .acc-item.open .arr {
      transform: rotate(180deg);
      color: #FFE500
    }

    .acc-panel {
      display: none;
      padding: 12px
    }

    .acc-item.open .acc-panel {
      display: block
    }

    /* ===== CARDS ===== */
    .cards {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px
    }

    @media(min-width:480px) {
      .cards {
        grid-template-columns: repeat(2, 1fr)
      }
    }

    @media(min-width:900px) {
      .cards {
        grid-template-columns: repeat(3, 1fr)
      }
    }

    .card {
      border: 3px solid #111;
      overflow: hidden
    }

    .card-title {
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 900;
      border-bottom: 3px solid #111;
      background: #f7f7f7;
      line-height: 1.4
    }

    .yt {
      position: relative;
      padding-top: 56.25%;
      background: #111;
      overflow: hidden;
      cursor: pointer
    }

    .yt img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity .2s
    }

    .yt:hover img {
      opacity: .8
    }

    .yt iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0
    }

    .play-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none
    }

    .play-icon span {
      width: 56px;
      height: 56px;
      background: #FFE500;
      border: 3px solid #111;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 4px 4px 0 #111
    }

    .play-icon span::after {
      content: '';
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 12px 0 12px 22px;
      border-color: transparent transparent transparent #111;
      margin-left: 4px
    }


    /* ===== HAMBURGER ===== */
    #hamburger{position:fixed;top:12px;right:12px;width:44px;height:44px;background:#111;border:3px solid #FFE500;cursor:pointer;display:none;flex-direction:column;align-items:center;justify-content:center;gap:5px;z-index:300;padding:0}
    #hamburger.show{display:flex}
    #hamburger span{display:block;width:20px;height:2px;background:#FFE500;transition:.25s}
    #hamburger.active span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    #hamburger.active span:nth-child(2){opacity:0}
    #hamburger.active span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
    #float-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none}
    #float-overlay.open{display:block}
    #float-panel{position:fixed;top:0;right:-100%;width:min(280px,82vw);height:100vh;background:#fff;border-left:4px solid #111;z-index:250;transition:right .28s;overflow-y:auto;padding:16px 14px}
    #float-panel.open{right:0}
    #float-panel .fp-head{font-size:13px;font-weight:900;border-bottom:3px solid #111;padding-bottom:10px;margin-bottom:12px}
    #float-panel .toc-col .lno{font-size:10px;font-weight:900;background:#111;color:#FFE500;display:inline-block;padding:1px 7px;margin:10px 0 4px}
    #float-panel .toc-col:first-child .lno:first-child{margin-top:0}
    #float-panel .toc-col p{font-size:12px;padding:1px 0;line-height:1.7}
    #float-panel .toc-col a{color:#111;text-decoration:none;border-bottom:2px solid transparent}
    #float-panel .toc-col a:hover{border-bottom-color:#FF3B3B}

    /* ===== PAGE TOP ===== */
    .totop {
      position: fixed;
      right: 16px;
      bottom: 20px;
      background: #111;
      color: #FFE500;
      border: none;
      width: 44px;
      height: 44px;
      font-size: 18px;
      cursor: pointer;
      font-weight: 900;
      border: 3px solid #FFE500;
      display: none;
      align-items: center;
      justify-content: center
    }

    .totop.show {
      display: flex
    }
  </style>
</head>

<body>

  <header class="page-header">
    <h1>CG発音レッスン母音と子音一覧</h1>
    <p>LESSON 1–24 / 46 VIDEOS</p>
  </header>

  <div class="toc" id="toc-wrap">
    <button class="toc-toggle" aria-expanded="false" onclick="toggleToc(this)">
      目次 INDEX <span class="arr">▼</span>
    </button>
    <div class="toc-body" id="toc-body"></div>
  </div>

  <div class="accordion" id="accordion"></div>

  <button class="totop" id="totop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
  <button id="hamburger" onclick="toggleFloat()" aria-label="目次"><span></span><span></span><span></span></button>
  <div id="float-overlay" onclick="closeFloat()"></div>
  <div id="float-panel"><div class="fp-head">目次 INDEX</div><div id="float-toc-body" style="display:grid;grid-template-columns:1fr;gap:0"></div></div>

  <script>
    const lessons = [
      { no: 1, items: [{ id: 'A1', v: 'eiOJrUijqb4', t: '母音「A」の発音' }, { id: 'I2', v: 'kNCYzCI7Wp8', t: '母音「I」の発音' }] },
      { no: 2, items: [{ id: 'S3', v: 'alvxT9Q1u9o', t: '子音「S」の発音' }, { id: 'Z4', v: 'J9RKZ91rYCE', t: '子音「Z」の発音' }] },
      { no: 3, items: [{ id: 'T5', v: 'BtzQWX-LV8w', t: '子音「T」の発音' }, { id: 'D6', v: 'ZbmEzxc1mBg', t: '子音「D」の発音' }] },
      { no: 4, items: [{ id: 'F7', v: 'BN1zskd7aQ4', t: '子音「F」の発音' }, { id: 'V8', v: 'FuQOcSjKEU0', t: '子音「V」の発音' }] },
      { no: 5, items: [{ id: 'A9', v: '96-fcafJDNY', t: '母音「A」（æ）の発音' }, { id: 'O10', v: 'NhpDv-wSPT8', t: '母音「O」の発音' }] },
      { no: 6, items: [{ id: 'A11', v: 'i8nl-6n80-k', t: '1ミリ母音「A」の発音' }, { id: 'r12', v: 'mIaWz1cLvc8', t: '母音「r」の発音' }] },
      { no: 7, items: [{ id: 'S13', v: 'alvxT9Q1u9o', t: '子音「S」の発音' }, { id: 'she14', v: 'pNDlzG_aifw', t: '子音「sh」の発音' }] },
      { no: 8, items: [{ id: 'EI15', v: '0NugxrgJqrI', t: '二重母音「EI」の発音' }, { id: 'AI16', v: 'aL_LwzofPBo', t: '二重母音「AI」の発音' }] },
      { no: 9, items: [{ id: 'TH17', v: '-YJsD-cy4OA', t: '子音「TH」（スー）の発音' }, { id: 'TH18', v: 'lUddZNqPpkg', t: '子音「TH」（ズ）の発音' }] },
      { no: 10, items: [{ id: 'she19', v: 'pNDlzG_aifw', t: '子音「sh」の発音' }, { id: 'ju20', v: 'lluxqCxhkU8', t: '子音「ʒ」の発音' }] },
      { no: 11, items: [{ id: 'K21', v: 'CE3SOn44YeY', t: '子音「K」の発音' }, { id: 'G22', v: '7D-yoTNLFyg', t: '子音「G」の発音' }] },
      { no: 12, items: [{ id: 'L23', v: '9dQIuR0LsSQ', t: '子音「L」の発音' }, { id: 'R24', v: 'j5dYxc1pAu4', t: '子音「R」の発音' }, { id: 'W25', v: 'YMQGytLLYuE', t: '子音「W」の発音' }] },
      { no: 13, items: [{ id: 'P26', v: 'OMoM6lHctMs', t: '子音「P」の発音' }, { id: 'B27', v: 'IWHPfwnuUso', t: '子音「B」の発音' }] },
      { no: 14, items: [{ id: 'M28', v: 'Zbmhr1GoU9s', t: '子音「M」の発音' }, { id: 'N29', v: '_KFa32wnGPo', t: '子音「N」の発音' }, { id: 'NG30', v: 'IPFVAPtU34s', t: '子音「NG」の発音' }] },
      { no: 15, items: [{ id: 'ts31', v: 'gHJoP5v6pqM', t: '子音「tʃ」の発音' }, { id: 'du32', v: 'lf_cTVa4U-o', t: '子音「dʒ」の発音' }] },
      { no: 16, items: [{ id: 'i33', v: '11rlAmUtIfg', t: '母音「イ」の発音' }, { id: 'IE34', v: 'kNCYzCI7Wp8', t: '母音「イエ」の発音' }] },
      { no: 17, items: [{ id: 'AU35', v: 'xbFRN7b6l8c', t: '二重母音「AU」の発音' }, { id: 'OU36', v: 'LpUX2kfi7BY', t: '二重母音「OU」の発音' }] },
      { no: 18, items: [{ id: 'OI37', v: 'c7KMVT_oYbk', t: '二重母音「OI」の発音' }] },
      { no: 19, items: [{ id: 'H38', v: 'Yv29recPhtc', t: '子音「H」の発音' }, { id: 'J39', v: '_OIR_ML-UEU', t: '子音「J」の発音' }] },
      { no: 20, items: [{ id: 'U40', v: 'R7AwEN7KHX4', t: '母音「U」（ウー）の発音' }, { id: 'U41', v: 'zX4HTyKEMYs', t: '母音「U」（短いウ）の発音' }] },
      { no: 21, items: [{ id: 'e42', v: '093oUKudxVI', t: '母音「E」の発音' }, { id: 'A43', v: 'UjP0cOgv3r0', t: '母音「A」の発音' }] },
      { no: 22, items: [{ id: 'ABC44', v: '_VYuSs3DEMM', t: 'アルファベットの発音' }] },
      { no: 23, items: [{ id: 'DEF45', v: 'RyPEPuB6Mjc', t: 'アルファベット「ゆっくりとハッキリ」' }] },
      { no: 24, items: [{ id: 'GHI46', v: 'n4YZU-LdoYs', t: 'アルファベット「語尾をのばして」' }] },
    ];

    // TOC build
    const tocBody = document.getElementById('toc-body');
    const colCount = 4;
    const cols = Array.from({ length: colCount }, () => { const d = document.createElement('div'); d.className = 'toc-col'; return d; });
    lessons.forEach((l, i) => {
      const col = cols[Math.floor(i / (Math.ceil(lessons.length / colCount))) % colCount] || cols[colCount - 1];
      const lno = document.createElement('p'); lno.className = 'lno'; lno.textContent = `LESSON ${l.no}`; col.appendChild(lno);
      l.items.forEach(it => { const p = document.createElement('p'); p.innerHTML = `<a href="#${it.id}" onclick="openLesson(${l.no})">${it.t}</a>`; col.appendChild(p); });
    });
    cols.forEach(c => tocBody.appendChild(c));
    tocBody.addEventListener('click',e=>{if(e.target.tagName==='A'){const btn=document.querySelector('.toc-toggle');btn.setAttribute('aria-expanded','false');tocBody.classList.remove('open');}});

    // Content build
    const acc = document.getElementById('accordion');
    function makeThumbnail(v, t) {
      return `<img src="https://img.youtube.com/vi/${v}/hqdefault.jpg" alt="${t}" loading="lazy"><div class="play-icon"><span></span></div>`;
    }
    function closeAll() {
      document.querySelectorAll('.yt.playing').forEach(el => {
        el.classList.remove('playing');
        el.querySelectorAll('img, .play-icon').forEach(e => e.style.display = '');
        const iframe = el.querySelector('iframe');
        if (iframe) { iframe.src = `https://www.youtube-nocookie.com/embed/${el.dataset.v}?rel=0`; iframe.style.display = 'none'; }
      });
    }
    lessons.forEach(l => {
      const titles = l.items.map(it => it.t).join('・');
      const item = document.createElement('div'); item.className = 'acc-item'; item.id = `L${l.no}`;
      item.innerHTML = `<button class="acc-btn" onclick="toggleAcc(this)"><span class="lesson-badge">LESSON ${l.no}</span><span class="titles">${titles}</span><span class="arr">▼</span></button><div class="acc-panel"><div class="cards"></div></div>`;
      const cards = item.querySelector('.cards');
      l.items.forEach(it => {
        const card = document.createElement('div'); card.className = 'card';
        card.innerHTML = `<div class="card-title" id="${it.id}">${it.t}</div><div class="yt" data-v="${it.v}" data-t="${it.t}"></div>`;
        const yt = card.querySelector('.yt');
        yt.innerHTML = makeThumbnail(it.v, it.t) + `<iframe src="https://www.youtube-nocookie.com/embed/${it.v}?rel=0" loading="lazy" frameborder="0" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" style="display:none"></iframe>`;
        yt.addEventListener('click', function () {
          if (this.classList.contains('playing')) return;
          closeAll();
          this.classList.add('playing');
          this.querySelectorAll('img, .play-icon').forEach(el => el.style.display = 'none');
          const iframe = this.querySelector('iframe');
          iframe.src = `https://www.youtube-nocookie.com/embed/${this.dataset.v}?rel=0&autoplay=1`;
          iframe.style.display = 'block';
        });
        cards.appendChild(card);
      });
      acc.appendChild(item);
    });

    function toggleAcc(btn) {
      const item=btn.closest('.acc-item');
      const isOpen=item.classList.contains('open');
      document.querySelectorAll('.acc-item').forEach(el=>el.classList.remove('open'));
      if(!isOpen){item.classList.add('open');setTimeout(()=>item.scrollIntoView({behavior:'smooth',block:'start'}),10);}
    }
    function openLesson(no){document.querySelectorAll('.acc-item').forEach(el=>el.classList.remove('open'));document.getElementById(`L${no}`).classList.add('open');}

    // TOC toggle
    function toggleToc(btn) {
      const body = document.getElementById('toc-body');
      const open = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', String(!open));
      body.classList.toggle('open', !open);
    }

    // Page top button
    const totop = document.getElementById('totop');
    window.addEventListener('scroll', () => totop.classList.toggle('show', scrollY > 400), { passive: true });
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (e.ctrlKey && ['c','a','u','s','p'].includes(e.key.toLowerCase())) e.preventDefault();
      if (e.key === 'F12') e.preventDefault();
    });

    // Floating TOC hamburger
    const hamburger=document.getElementById('hamburger');
    const floatPanel=document.getElementById('float-panel');
    const floatOverlay=document.getElementById('float-overlay');
    const floatBody=document.getElementById('float-toc-body');
    // Clone TOC cols into float panel
    document.querySelectorAll('#toc-body .toc-col').forEach(col=>{
      const c=col.cloneNode(true);
      c.querySelectorAll('a').forEach(a=>a.addEventListener('click',closeFloat));
      floatBody.appendChild(c);
    });
    new IntersectionObserver(entries=>{
      hamburger.classList.toggle('show',!entries[0].isIntersecting);
    },{threshold:0}).observe(document.querySelector('.toc'));
    function toggleFloat(){
      const open=floatPanel.classList.toggle('open');
      floatOverlay.classList.toggle('open',open);
      hamburger.classList.toggle('active',open);
    }
    function closeFloat(){
      floatPanel.classList.remove('open');
      floatOverlay.classList.remove('open');
      hamburger.classList.remove('active');
    }
  </script>
</body>

</html>
