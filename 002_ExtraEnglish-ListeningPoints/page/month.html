<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extra English</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="back-btn">‹</a>
    <div class="header-titles">
      <div id="header-title" class="header-title"></div>
      <div class="header-sub">Extra English リスニング完全攻略</div>
    </div>
  </div>
</header>

<div class="month-hero">
  <div id="month-hero-icon" class="month-hero-icon"></div>
  <div>
    <div id="month-hero-name" class="month-hero-name"></div>
  </div>
</div>

<div class="content">
  <p style="font-size:12px;color:#0077B6;font-weight:700;padding:2px 4px;">▼ レッスンを選んでください</p>
  <div id="lesson-grid" class="lesson-grid"></div>
  <div class="spacer"></div>
  <a href="list.html" class="list-card">
    <div class="list-card-icon">📋</div>
    <div class="list-card-body">
      <div class="list-card-title">全一覧で復習する</div>
      <div class="list-card-sub">Month 1〜3 すべてのポイントを一画面で確認</div>
    </div>
    <div class="list-card-arrow">›</div>
  </a>
</div>

<script src="js/data.js"></script>
<script src="js/script.js"></script>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var mNo = parseInt(params.get('m'), 10) || 1;
  var month = DATA.months[mNo - 1];
  if (!month) { document.body.innerHTML = '<p style="padding:32px">ページが見つかりません</p>'; return; }

  document.title = month.name + ' | Extra English';
  document.getElementById('header-title').textContent = month.name;
  document.getElementById('month-hero-icon').textContent = month.icon;
  document.getElementById('month-hero-name').textContent = month.name;

  var html = '';
  month.lessons.forEach(function (lesson) {
    html +=
      '<a href="day.html?m=' + mNo + '&l=' + lesson.no + '" class="lesson-card">' +
        '<div class="lesson-num">' + lesson.no + '</div>' +
        '<div class="lesson-card-body">' +
          '<div class="lesson-card-day">'   + lesson.day   + '</div>' +
          '<div class="lesson-card-title">' + lesson.title + '</div>' +
        '</div>' +
        '<div class="lesson-card-arrow">›</div>' +
      '</a>';
  });
  document.getElementById('lesson-grid').innerHTML = html;
})();
</script>
</body>
</html>
