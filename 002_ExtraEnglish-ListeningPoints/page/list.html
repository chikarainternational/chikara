<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全一覧（復習用） | Extra English</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .list-section-title {
      font-size: 14px;
      font-weight: 800;
      color: #0077B6;
      padding: 10px 4px 5px;
      border-bottom: 2px solid #CAF0F8;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .list-section-title a {
      font-size: 11px;
      font-weight: 700;
      color: #00B4D8;
      background: #E0F7FA;
      border-radius: 8px;
      padding: 2px 8px;
      margin-left: auto;
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="back-btn">‹</a>
    <div class="header-titles">
      <div class="header-title">全一覧（復習用）</div>
      <div class="header-sub">Extra English リスニング完全攻略</div>
    </div>
  </div>
</header>

<div class="content">

  <div class="filter-row">
    <button class="filter-btn active" data-filter="all"  onclick="filterMonth('all')">すべて</button>
    <button class="filter-btn"        data-filter="m1"   onclick="filterMonth('m1')">Month 1</button>
    <button class="filter-btn"        data-filter="m2"   onclick="filterMonth('m2')">Month 2</button>
    <button class="filter-btn"        data-filter="m3"   onclick="filterMonth('m3')">Month 3</button>
  </div>

  <div id="list-content"></div>

  <p class="note-sm">Extra English コーチング・プログラム対応 ｜ Month 1〜3 全レッスン収録</p>

</div>

<script src="js/data.js"></script>
<script src="js/script.js"></script>
<script>
var MONTH_ICONS = ['📘', '📗', '📙'];
var MONTH_KEYS  = ['m1', 'm2', 'm3'];

function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderList() {
  var html = '';

  // ===== 全学習ポイント =====
  html += '<div class="section-row"><span class="section-icon">📖</span><span class="section-text">全学習ポイント</span><div class="section-line"></div></div>';

  DATA.months.forEach(function (month, mi) {
    var key = MONTH_KEYS[mi];
    html += '<div class="month-group" data-month="' + key + '">';
    html += '<div class="list-section-title">' + MONTH_ICONS[mi] + ' ' + month.name + ' <a href="month.html?m=' + month.no + '">レッスンへ</a></div>';
    html += '<div class="accordion-list">';
    var num = 1;
    month.lessons.forEach(function (lesson) {
      lesson.learn.forEach(function (item) {
        var hasBody = item.desc || item.examples.length;
        if (hasBody) {
          html += '<details class="learn-item">';
          html += '<summary>';
          html += '<span class="learn-num">' + num++ + '</span>';
          html += '<div class="learn-summary-text"><span class="learn-phrase">' + esc(item.phrase) + '</span><div class="learn-jp">' + esc(item.jp) + '</div></div>';
          html += '<span class="learn-arrow">▼</span>';
          html += '</summary>';
          html += '<div class="learn-body">';
          if (item.desc) html += '<div class="learn-desc">' + esc(item.desc).replace(/\n/g, '<br>') + '</div>';
          if (item.examples.length) {
            html += '<div class="learn-examples">';
            item.examples.forEach(function (ex) {
              html += '<div class="learn-ex">' + esc(ex.en) + '</div>';
              if (ex.jp) html += '<div class="learn-ex-jp">' + esc(ex.jp) + '</div>';
            });
            html += '</div>';
          }
          html += '</div></details>';
        } else {
          html += '<div class="learn-item learn-item-plain">';
          html += '<span class="learn-num">' + num++ + '</span>';
          html += '<div class="learn-summary-text"><span class="learn-phrase">' + esc(item.phrase) + '</span><div class="learn-jp">' + esc(item.jp) + '</div></div>';
          html += '</div>';
        }
      });
    });
    html += '</div></div>';
  });

  // ===== 全リスニングポイント =====
  html += '<div class="section-row"><span class="section-icon">🎧</span><span class="section-text">全リスニングポイント</span><div class="section-line"></div></div>';

  DATA.months.forEach(function (month, mi) {
    var key = MONTH_KEYS[mi];
    html += '<div class="month-group" data-month="' + key + '">';
    html += '<div class="list-section-title">' + MONTH_ICONS[mi] + ' ' + month.name + ' <a href="month.html?m=' + month.no + '">レッスンへ</a></div>';
    html += '<div class="listen-card">';
    month.lessons.forEach(function (lesson) {
      lesson.listen.forEach(function (item) {
        html += '<div class="listen-item">';
        html += '<div class="listen-en-row"><div class="listen-en">' + esc(item.en) + '</div>' + (window.ttsBtnHtml ? window.ttsBtnHtml(item.en) : '') + '</div>';
        html += '<div class="listen-kana">' + esc(item.kana) + '</div>';
        if (item.note)    html += '<div class="listen-note">'    + esc(item.note)    + '</div>';
        if (item.example) html += '<div class="listen-example">' + esc(item.example) + '</div>';
        html += '</div>';
      });
    });
    html += '</div></div>';
  });

  document.getElementById('list-content').innerHTML = html;
}

function filterMonth(m) {
  document.querySelectorAll('.month-group').forEach(function (el) {
    el.style.display = (m === 'all' || el.dataset.month === m) ? '' : 'none';
  });
  document.querySelectorAll('.filter-btn').forEach(function (btn) {
    btn.classList.toggle('active', btn.dataset.filter === m);
  });
}

renderList();
</script>
</body>
</html>
